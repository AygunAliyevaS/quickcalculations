name: Deploy to Azure Web App (credentials)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install & build
        run: |
          npm ci
          npm run build --if-present

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Web App
        run: |
          # Deploy the Vite build output (dist)
          if [ -d "./dist" ]; then
            zip -r dist.zip dist
          else
            echo "dist directory missing" >&2
            exit 1
          fi
          az webapp deploy --resource-group matrix --name quickcalculations --type zip --src-path ./dist.zip
