name: Deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present
      
      - name: 'Login to Azure'
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 'Deploy to Azure WebApp (az cli)'
        run: |
          az extension add --name webapp --yes || true
          if [ -d "./dist" ]; then
            zip -r dist.zip dist
          else
            echo "dist directory missing" >&2
            exit 1
          fi
          az webapp deploy --resource-group matrix --name quickcalculations --src-path ./dist.zip --type zip
